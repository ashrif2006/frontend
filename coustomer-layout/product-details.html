<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitleSlot">تفاصيل المنتج — A7-store</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Cairo:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/theme.css" rel="stylesheet">

  <style>
    body { font-family: "Plus Jakarta Sans", "Cairo", sans-serif; }
    h1,h2,h3,h4,.display { font-family: "Sora", "Cairo", sans-serif; }

    .breadcrumb-bar { font-size: 0.85rem; color: var(--slate); }
    .breadcrumb-bar a { color: var(--slate); }
    .breadcrumb-bar a:hover { color: var(--primary); }

    .qty-stepper.lg button { width: 38px; height: 38px; font-size: 1.1rem; }
    .qty-stepper.lg .qty-val { min-width: 40px; font-size: 1rem; }

    .pd-section-divider { border-top: 1px solid var(--line); margin: 1.5rem 0; }
  </style>
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar navbar-expand-lg store-navbar sticky-top py-3">
    <div class="container d-flex align-items-center justify-content-between gap-3">
      <a href="store.html" class="brand-lockup">
        <span class="a7-mark sm">A7</span>
        <span id="navBrandName">A7-store</span>
      </a>
      <button class="cart-trigger" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas" aria-label="السلة">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-count-badge" style="display:none;">0</span>
      </button>
    </div>
  </nav>

  <main class="container py-4">

    <div class="breadcrumb-bar mb-3">
      <a href="store.html">المتجر</a> <span>/</span> <span id="breadcrumbProductName">تفاصيل المنتج</span>
    </div>

    <div id="productDetailsContent">
      <!-- rendered dynamically by js/product-details.js -->
      <div class="row g-4">
        <div class="col-md-6">
          <div class="skeleton" style="aspect-ratio:1/1; border-radius:var(--r-md);"></div>
        </div>
        <div class="col-md-6">
          <div class="skeleton mb-3" style="height:28px; width:70%;"></div>
          <div class="skeleton mb-3" style="height:20px; width:40%;"></div>
          <div class="skeleton mb-2" style="height:14px; width:100%;"></div>
          <div class="skeleton mb-2" style="height:14px; width:90%;"></div>
        </div>
      </div>
    </div>

    <!-- related products -->
    <div class="pd-section-divider"></div>
    <h3 class="h5 mb-3">منتجات تانية ممكن تعجبك</h3>
    <div class="row g-3" id="relatedProductsGrid"></div>

  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="store-footer py-5 mt-4">
    <div class="container d-flex flex-wrap justify-content-between align-items-center gap-3">
      <div class="brand-lockup" style="color:#fff;">
        <span class="a7-mark sm">A7</span>
        <span style="color:#fff;">A7-store</span>
      </div>
      <p class="mb-0" style="font-size:0.85rem;">جميع الحقوق محفوظة</p>
    </div>
  </footer>

  <!-- ===================== CART OFFCANVAS ===================== -->
  <div class="offcanvas offcanvas-end cart-offcanvas" tabindex="-1" id="cartOffcanvas">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title d-flex align-items-center gap-2">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        سلة المشتريات
      </h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <div id="cartOffcanvasBody"></div>
      <div class="cart-footer" style="display:none;">
        <div class="cart-summary-row total">
          <span>الإجمالي</span>
          <span id="cartSubtotal">0 ج.م</span>
        </div>
        <a href="checkout.html" id="cartCheckoutBtn" class="btn btn-primary-brand btn-block btn-lg mt-2">إتمام الطلب</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/cart-ui.js"></script>
  <script type="module" src="js/product-details.js"></script>
</body>
</html>
