<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitleSlot">A7-store</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Cairo:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/theme.css" rel="stylesheet">

  <style>
    body { font-family: "Plus Jakarta Sans", "Cairo", sans-serif; }
    h1,h2,h3,h4,.display { font-family: "Sora", "Cairo", sans-serif; }

    .filter-pills { display:flex; gap:0.5rem; overflow-x:auto; padding-bottom:0.25rem; }
    .filter-pill {
      border:1.5px solid var(--line); background:#fff; border-radius:100px;
      padding:0.45rem 1.1rem; font-size:0.85rem; font-weight:700; color:var(--slate);
      cursor:pointer; white-space:nowrap; transition:0.12s;
    }
    .filter-pill:hover, .filter-pill.active { border-color:var(--primary); color:var(--primary); background:var(--primary-soft); }

    .toast-cart {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 1090;
    }
  </style>
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar navbar-expand-lg store-navbar sticky-top py-3">
    <div class="container d-flex align-items-center justify-content-between gap-3">
      <div class="brand-lockup">
        <span class="a7-mark sm">A7</span>
        <span id="navBrandName">A7-store</span>
      </div>
      <button class="cart-trigger" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas" aria-label="السلة">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-count-badge" style="display:none;">0</span>
      </button>
    </div>
  </nav>

  <!-- ===================== STORE HERO ===================== -->
  <section class="store-hero">
    <div class="container">
      <div class="d-flex align-items-center gap-3 flex-wrap">
        <div class="store-logo-ring">
          <img id="storeLogoImg" alt="logo" style="display:none;">
          <span id="storeLogoFallback" class="fallback-initial">A</span>
        </div>
        <div>
          <h1 class="h3 mb-1" id="storeName">جاري التحميل…</h1>
          <div class="d-flex gap-2 flex-wrap">
            <span class="store-meta-pill">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/></svg>
              <span id="productCountPill">— منتج</span>
            </span>
            <a href="#" id="storeWaPill" class="store-meta-pill" style="display:none; text-decoration:none;" target="_blank">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="#25d366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
              <span class="wa-pill-text">تواصل واتساب</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ===================== PRODUCTS ===================== -->
  <main class="container py-4">

    <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
      <div class="filter-pills" id="filterPills">
        <span class="filter-pill active" data-filter="all">كل المنتجات</span>
        <span class="filter-pill" data-filter="sale">عروض وتخفيضات</span>
      </div>
      <div class="position-relative" style="max-width:260px; width:100%;">
        <span style="position:absolute; left:0.8rem; top:50%; transform:translateY(-50%); color:var(--slate-light);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="search" id="productSearchInput" class="form-control" style="padding-right:0.85rem; padding-left:2.4rem;" placeholder="ابحث عن منتج…">
      </div>
    </div>

    <div class="row g-3" id="productsGrid">
      <!-- rendered dynamically by js/store.js -->
    </div>

  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="store-footer py-5 mt-4">
    <div class="container d-flex flex-wrap justify-content-between align-items-center gap-3">
      <div class="brand-lockup" style="color:#fff;">
        <span class="a7-mark sm">A7</span>
        <span style="color:#fff;">A7-store</span>
      </div>
      <p class="mb-0" style="font-size:0.85rem;">جميع الحقوق محفوظة</p>
    </div>
  </footer>

  <!-- ===================== CART OFFCANVAS ===================== -->
  <div class="offcanvas offcanvas-end cart-offcanvas" tabindex="-1" id="cartOffcanvas">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title d-flex align-items-center gap-2">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        سلة المشتريات
      </h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <div id="cartOffcanvasBody">
        <!-- rendered dynamically by js/cart-ui.js -->
      </div>
      <div class="cart-footer" style="display:none;">
        <div class="cart-summary-row total">
          <span>الإجمالي</span>
          <span id="cartSubtotal">0 ج.م</span>
        </div>
        <a href="checkout.html" id="cartCheckoutBtn" class="btn btn-primary-brand btn-block btn-lg mt-2">إتمام الطلب</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/cart-ui.js"></script>
  <script type="module" src="js/store.js"></script>
</body>
</html>
