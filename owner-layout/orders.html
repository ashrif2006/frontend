<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الطلبات — A7-store</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Cairo:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/theme.css" rel="stylesheet">

  <style>
    body { font-family:"Plus Jakarta Sans","Cairo",sans-serif; }
    h1,h2,h3,h4,.display { font-family:"Fraunces","Cairo",serif; }
    .eyebrow,.num,.price,.stat-value,.order-id { font-family:"JetBrains Mono",monospace; }

    .dash-layout { display:flex; min-height:100vh; }
    .dash-sidebar-desktop { width:264px; flex-shrink:0; display:none; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto; }
    @media (min-width:992px){ .dash-sidebar-desktop{ display:flex; } }
    .dash-content { flex:1; min-width:0; display:flex; flex-direction:column; }
    .dash-topbar { display:flex; align-items:center; justify-content:space-between; padding:0 1.5rem; gap:1rem; }
    .topbar-avatar { width:38px; height:38px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-family:"Fraunces",serif; font-weight:700; cursor:pointer; }

    /* status tabs */
    .status-tabs { display:flex; gap:0.25rem; overflow-x:auto; padding-bottom:0.25rem; }
    .status-tab {
      border:none; background:transparent;
      font-family:"Plus Jakarta Sans","Cairo",sans-serif;
      font-weight:600; font-size:0.9rem;
      color:var(--slate); padding:0.6rem 1.1rem;
      border-bottom: 2.5px solid transparent;
      white-space:nowrap; cursor:pointer; transition:0.12s;
    }
    .status-tab:hover { color:var(--ink); }
    .status-tab.active { color:var(--accent-dark); border-bottom-color:var(--accent); }
    .status-tab .tab-count {
      font-family:"JetBrains Mono",monospace;
      font-size:0.72rem;
      background:var(--accent); color:#fff;
      padding:0.1rem 0.4rem; border-radius:100px;
      margin-right:0.35rem;
    }
    .status-tab.active.pending-tab .tab-count { background:var(--warn); }

    /* order card */
    .order-card {
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--r-md);
      overflow:hidden;
      margin-bottom:0.85rem;
      transition: box-shadow 0.15s;
    }
    .order-card:hover { box-shadow: var(--shadow-card); }
    .order-card.pending { border-right:4px solid var(--warn); }
    .order-card.confirmed { border-right:4px solid var(--accent); }
    .order-card.shipped { border-right:4px solid #3a7ee8; }
    .order-card.delivered { border-right:4px solid #52a849; }
    .order-card.cancelled { border-right:4px solid var(--slate-light); }

    .order-card-header {
      display:flex; align-items:center; flex-wrap:wrap;
      gap:0.75rem; padding: 1rem 1.2rem;
      cursor:pointer;
    }
    .order-id { color:var(--slate); font-size:0.82rem; }
    .customer-name { font-weight:700; font-size:0.95rem; }
    .order-time { color:var(--slate-light); font-size:0.82rem; }
    .order-total { font-family:"JetBrains Mono",monospace; font-weight:700; font-size:1rem; margin-right:auto; }

    .order-card-body { padding: 0 1.2rem 1.2rem; border-top:1px solid var(--line); }
    .order-detail-row { display:flex; gap:0.5rem; align-items:flex-start; padding:0.7rem 0; border-bottom:1px solid var(--line); }
    .order-detail-row:last-of-type { border-bottom:none; }
    .detail-label { font-size:0.82rem; color:var(--slate-light); width:90px; flex-shrink:0; padding-top:1px; }
    .detail-val { font-size:0.9rem; font-weight:500; }

    .order-items-list { margin-top:0.5rem; }
    .order-item-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:0.55rem 0;
      border-bottom:1px dashed var(--line);
      font-size:0.9rem;
    }
    .order-item-row:last-child { border-bottom:none; }
    .order-item-name { font-weight:600; }
    .order-item-qty { color:var(--slate); font-size:0.82rem; margin-top:1px; }
    .order-item-price { font-family:"JetBrains Mono",monospace; font-weight:700; font-size:0.92rem; flex-shrink:0; }

    .order-actions { display:flex; gap:0.6rem; flex-wrap:wrap; padding-top:1rem; }

    /* whatsapp button */
    .btn-whatsapp { background:#25d366; color:#fff; font-weight:700; }
    .btn-whatsapp:hover { background:#1ab756; color:#fff; }

    /* search + filter */
    .filter-chip { border:1.5px solid var(--line); background:#fff; border-radius:100px; padding:0.35rem 1rem; font-size:0.85rem; font-weight:600; cursor:pointer; color:var(--slate); transition:0.12s; }
    .filter-chip:hover,.filter-chip.active { border-color:var(--accent); color:var(--accent-dark); background:var(--accent-soft); }
  </style>
</head>
<body class="dash-body">
<div class="dash-layout">

  <!-- sidebar desktop -->
  <aside class="dash-sidebar dash-sidebar-desktop">
    <div class="brand"><span class="dot"></span> A7-store</div>
    <nav class="dash-nav">
      <span class="nav-section-label">الرئيسية</span>
      <a href="dashboard.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        لوحة التحكم
      </a>
      <span class="nav-section-label mt-2">المتجر</span>
      <a href="products.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        المنتجات
      </a>
      <a href="orders.html" class="nav-link active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="M9 12h6M9 16h4"/></svg>

        <span class="badge-count">3</span>
      </a>
      <a href="store-settings.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        إعدادات المتجر
      </a>
    </nav>
  </aside>

  <!-- offcanvas mobile -->
  <div class="offcanvas offcanvas-end dash-sidebar" tabindex="-1" id="mobileSidebar" style="width:264px;">
    <div class="offcanvas-header border-0 p-0">
      <div class="brand w-100"><span class="dot"></span> A7-store
        <button type="button" class="btn-close btn-close-white ms-auto" data-bs-dismiss="offcanvas"></button>
      </div>
    </div>
    <nav class="dash-nav">
      <a href="dashboard.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        لوحة التحكم
      </a>
      <a href="products.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        المنتجات
      </a>
      <a href="orders.html" class="nav-link active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg>
        الطلبات <span class="badge-count">3</span>
      </a>
      <a href="store-settings.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        إعدادات المتجر
      </a>
    </nav>
  </div>

  <!-- main -->
  <div class="dash-content">
    <header class="dash-topbar">
      <div class="d-flex align-items-center gap-3">
        <button class="sidebar-toggle-btn mobile-only" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span style="font-weight:700; font-size:1rem;">الطلبات</span>
      </div>
      <div class="topbar-avatar">A7</div>
    </header>

    <main class="dash-main">
      <!-- page header -->
      <div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-4">
        <div>
          <span class="eyebrow">إدارة الطلبات</span>
          <h1 class="h3 mt-1 mb-0">الطلبات</h1>
        </div>
        <div class="position-relative" style="max-width:300px; width:100%;">
          <span style="position:absolute; left:0.8rem; top:50%; transform:translateY(-50%); color:var(--slate-light);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <input type="search" id="orderSearchInput" class="form-control" style="padding-right:0.85rem; padding-left:2.4rem;" placeholder="ابحث باسم العميل أو رقم الطلب…">
        </div>
      </div>

      <!-- status tabs -->
      <div class="status-tabs mb-4">
        <button class="status-tab active pending-tab" onclick="filterOrders('all', this)">
          الكل <span class="tab-count">0</span>
        </button>
        <button class="status-tab" onclick="filterOrders('PENDING', this)">
          معلّق <span class="tab-count">0</span>
        </button>
        <button class="status-tab" onclick="filterOrders('CONFIRMED', this)">مؤكد</button>
        <button class="status-tab" onclick="filterOrders('SHIPPED', this)">في الشحن</button>
        <button class="status-tab" onclick="filterOrders('DELIVERED', this)">تم التوصيل</button>
        <button class="status-tab" onclick="filterOrders('CANCELLED', this)">ملغي</button>
      </div>

      <!-- orders list -->
      <div id="ordersList">
        <!-- orders are rendered dynamically by js/orders.js -->
      </div><!-- /ordersList -->

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/orders.js"></script>
</body>
</html>
